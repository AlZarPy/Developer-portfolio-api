services:
  - type: web
    name: developer-portfolio-api
    runtime: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: production
      - key: AUTO_CREATE_TABLES
        value: "false"
      - key: AI_PROVIDER
        value: gemini
      - key: CONTACT_RATE_LIMIT
        value: 5/minute
      - key: LOG_FILE
        value: logs/app.log
